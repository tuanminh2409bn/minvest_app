<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MInvest Forex App - AI Trading Signals">
  <meta name="google-signin-client_id" content="245218403052-vv7n891gojgk69s9pgclcsdh0idkshvt.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MInvest">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MInvest Forex App</title>
  <link rel="manifest" href="manifest.json">

  <script>
    var serviceWorkerVersion = "{{flutter_service_worker_version}}";
  </script>

  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>

  <!-- CSS cho body và html cơ bản -->
  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background-color: #000000; /* Màu đen tuyền */
      overflow: hidden; /* Ngăn cuộn mặc định của trình duyệt để Flutter xử lý */
    }
  </style>
</head>
<body>

<script>
  window.addEventListener('load', function(ev) {
    // Tải Flutter engine trực tiếp, bỏ qua Service Worker để tránh lỗi cache
    _flutter.loader.loadEntrypoint({
      // serviceWorker: {
      //   serviceWorkerVersion: serviceWorkerVersion,
      // }
    }).then(function(engineInitializer) {
      return engineInitializer.initializeEngine();
    }).then(function(appRunner) {
      return appRunner.runApp();
    });
  });
</script>
</body>
</html>
